# =============================================================================
# Comic Translator 默认全局配置模板
# 该文件为项目级默认配置，可被以下配置覆盖（优先级由低到高）：
#   1. 本文件（默认全局配置）
#   2. ~/.comic-translator/config.yaml（用户级个性化）
#   3. workspace.yaml（工作区级，随项目分发）
#   4. COMIC_TRANSLATOR_ 前缀的环境变量
# =============================================================================

# HTTP 服务器配置
server:
  http:
    addr: "0.0.0.0:8080"   # 监听地址和端口
    timeout: "30s"          # 请求超时时间

# 数据库配置
database:
  driver: "sqlite"                          # 数据库驱动（sqlite）
  dsn: "./data/comic-translator.db"         # 数据库文件路径

# 向量存储配置（用于 RAG 知识库）
vectorstore:
  type: "chromem"          # 向量库类型（目前支持: chromem）
  path: "./data/chromem"   # 向量数据持久化目录

# 大语言模型配置
llm:
  provider: "deepseek"               # 服务提供商（deepseek / openai / 其他）
  api_key_env: "DEEPSEEK_API_KEY"    # API Key 所在环境变量名（不直接写入 Key）
  model: "deepseek-chat"             # 模型名称
  base_url: "https://api.deepseek.com"  # API 基础 URL

# 图片加工配置（OCR / 图片生成）
image_processing:
  provider: "gpt-image-2"     # 图片处理提供商
  api_key_env: "OPENAI_API_KEY"  # API Key 所在环境变量名
  model: "gpt-image-2"        # 模型名称

# 日志配置
logging:
  level: "info"    # 日志级别（debug / info / warn / error）
  format: "json"   # 输出格式（json / text）
